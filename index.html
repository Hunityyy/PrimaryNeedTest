<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基本需求满足度测试</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <h1>基本需求满足度测试</h1>
            <p>了解你在不同维度下的需求现状与期望</p>
        </header>

        <main id="quiz-container">
            <!-- 答题区域 -->
            <div id="question-view">
                <h2 id="dimension-title"></h2>
                <div id="questions"></div>
                <button id="next-btn">下一页</button>
            </div>

            <!-- 结果区域 -->
            <div id="result-view" style="display: none;">
                <h2>测试结果</h2>
                <div class="chart-container">
                    <canvas id="radarChart"></canvas>
                </div>
                <div id="chart-controls">
                    <!-- 控制折线显示的复选框将在此生成 -->
                </div>

                <button id="download-btn">下载雷达图</button>

                <div class="quadrant-container">
                    <h3>需求象限分析指南</h3>
                    <div class="quadrant-grid">
                        <div class="quadrant-item">
                            <strong>象限 1</strong>
                            <div class="quadrant-info">满足低/重要高</div>
                            你今天感觉重要的需求得不到满足。如何在生活中给这些需求更多空间？
                        </div>
                        <div class="quadrant-item">
                            <strong>象限 2</strong>
                            <div class="quadrant-info">满足高/重要高</div>
                            你感觉得到的需求在很大程度上得到了满足。恭喜你！
                        </div>
                        <div class="quadrant-item">
                            <strong>象限 3</strong>
                            <div class="quadrant-info">满足低/重要低</div>
                            这些需求既没得到满足也不重要。这完全可以接受，或者你已忽略了它们。
                        </div>
                        <div class="quadrant-item">
                            <strong>象限 4</strong>
                            <div class="quadrant-info">满足高/重要低</div>
                            这些需求虽然得到了满足，但并不重要。现状可以保持不变。
                        </div>
                    </div>
                </div>

                <button onclick="location.reload()">重新测试</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
